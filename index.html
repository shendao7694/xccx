<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星辰残响文档</title>
    <link rel="icon" href="./public/images/icon.png" type="image/png">
    <link rel="stylesheet" href="./public/css/style.css">
</head>
<body>
    <div class="background-overlay"></div>

    <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    
    <div class="theme-toggle-wrapper">
        <button class="theme-toggle-btn" id="themeToggleBtn">🌙</button>
    </div>
    
    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>星辰残响文档</h1>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <div class="tree-view" id="treeContainer"></div>
            </nav>
        </aside>

        <main class="main-content">
            <section id="intro">
                <h2>简介</h2>
                <p>欢迎来到<span class="highlight">星辰残响</span>服务器！<br></p>
                <p>连接地址：<span class="highlight">anji.cc.cd</span></p>
                <p>最佳版本:MinecraftJava1.21.11</a></p>
                <p>该服务器不定时开启，可前往QQ群1062163836询问群主开启一起玩（因为不是主要服务器，可以前往无名之地游玩:doc.fhg.cc.cd）</a></p>
            </section>

            <section id="recipe" style="display: none;">
                <h2>配方</h2>
                <h3>自定义合成配方</h3>
                <p>暂无配方</a></p>
            </section>

            <section id="tip" style="display: none;">
                <h2>提示</h2>
                <p>输入/mc可以打开菜单</a></p>
            </section>
        </main>
    </div>

    <div class="back-to-top" onclick="scrollToTopWithAnimation()"></div>

    <script>
        const treeData = [
            { name: "内容", icon: "📦", open: true, children: [
                { name: "简介", icon: "✨", url: "#intro", type: "link" },
                { name: "配方", icon: "📖", url: "#recipe", type: "link" },
                { name: "提示", icon: "ℹ️", url: "#tip", type: "link" }
            ]}
        ];

        function renderTree(nodes, level = 0) {
            let html = '';
            for (let node of nodes) {
                const hasChildren = node.children && node.children.length > 0;
                const isOpen = node.open === true;
                if (hasChildren) {
                    html += `<div class="tree-node"><div class="tree-node-header" data-toggle="${node.name.replace(/\s/g, '')}"><span class="tree-toggle">${isOpen ? '[-]' : '[+]'}</span><span class="tree-icon">${node.icon || '📁'}</span><span class="tree-name">${node.name}</span></div><div class="tree-children" style="${isOpen ? '' : 'display: none;'}">${renderTree(node.children, level + 1)}</div></div>`;
                } else {
                    html += `<div class="tree-node"><a href="${node.url || '#'}" class="tree-leaf-item" data-page="${node.name}"><span class="tree-icon">${node.icon || '📄'}</span><span class="tree-name">${node.name}</span><span class="tree-arrow">→</span></a></div>`;
                }
            }
            return html;
        }

        function initTreeView() {
            const container = document.getElementById('treeContainer');
            if (!container) return;
            container.innerHTML = renderTree(treeData);
            
            container.querySelectorAll('.tree-node-header').forEach(header => {
                header.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const childrenDiv = header.parentElement.querySelector(':scope > .tree-children');
                    const toggleSpan = header.querySelector('.tree-toggle');
                    if (childrenDiv) {
                        if (childrenDiv.style.display === 'none') {
                            childrenDiv.style.display = 'block';
                            if (toggleSpan) toggleSpan.textContent = '[-]';
                        } else {
                            childrenDiv.style.display = 'none';
                            if (toggleSpan) toggleSpan.textContent = '[+]';
                        }
                    }
                });
            });

            container.querySelectorAll('.tree-leaf-item').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetId = link.getAttribute('href').substring(1);
                    document.querySelectorAll('.main-content > section').forEach(section => {
                        section.style.display = 'none';
                    });
                    const targetSection = document.getElementById(targetId);
                    if (targetSection) {
                        targetSection.style.display = 'block';
                    }
                    if (window.innerWidth <= 768) {
                        document.getElementById('sidebar').classList.remove('active');
                        document.getElementById('sidebarOverlay').classList.remove('active');
                        document.getElementById('menuToggle').classList.remove('active');
                        document.body.style.overflow = '';
                    }
                });
            });
        }

        function setThemeMode(isDark) {
            const root = document.documentElement;
            const btn = document.getElementById('themeToggleBtn');
            if (isDark) {
                root.setAttribute('data-theme', 'dark');
                if (btn) btn.textContent = '☀️';
            } else {
                root.removeAttribute('data-theme');
                if (btn) btn.textContent = '🌙';
            }
            const url = new URL(window.location.href);
            if (isDark) url.searchParams.set('darkmode', '1');
            else url.searchParams.set('darkmode', '0');
            window.history.replaceState({}, '', url);
        }

        function getDarkModeFromURL() {
            const params = new URLSearchParams(window.location.search);
            const darkParam = params.get('darkmode');
            if (darkParam === '1') return true;
            if (darkParam === '0') return false;
            return false;
        }

        function applyInitialTheme() {
            setThemeMode(getDarkModeFromURL());
        }

        function scrollToTopWithAnimation() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.addEventListener('scroll', function() {
            const backBtn = document.querySelector('.back-to-top');
            if (window.scrollY > 300) {
                backBtn.classList.add('visible');
            } else {
                backBtn.classList.remove('visible');
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            initTreeView();
            applyInitialTheme();
            
            document.getElementById('themeToggleBtn')?.addEventListener('click', () => {
                const isDark = document.documentElement.hasAttribute('data-theme');
                setThemeMode(!isDark);
            });
            
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            
            function toggleSidebar() {
                menuToggle.classList.toggle('active');
                sidebar.classList.toggle('active');
                sidebarOverlay.classList.toggle('active');
                document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
            }
            
            function closeSidebar() {
                menuToggle.classList.remove('active');
                sidebar.classList.remove('active');
                sidebarOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }
            
            menuToggle?.addEventListener('click', toggleSidebar);
            sidebarOverlay?.addEventListener('click', closeSidebar);
            
            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) closeSidebar();
            });
        });
    </script>
</body>
</html>
